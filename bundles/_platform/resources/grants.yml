# Base grants on schemas owned by the platform bundle.
#
# Per ADR 0001's access-tier-via-suffix convention, raw and processed schemas
# are engineer-tier; analysis-layer schemas are user-tier. Grants on
# subject-specific schemas (`wastewater_raw`, `wastewater`, etc.) are
# declared by the corresponding subject bundle, not here.
#
# Grants on `_ops` schemas:
#   - Engineers (ecdh-data-engineers group): full access (USE_SCHEMA + SELECT + MODIFY)
#   - End users: no access by default (operational data; not for analytical use)
#
# Grants on catalogs themselves are minimal and set out-of-band by the account
# admin during catalog creation. The deploy service principals already have
# the catalog-level grants they need.

resources:
  grants:
    ops_source_grants:
      securable_type: SCHEMA
      securable_name: ${var.source_catalog}._ops
      grants:
        - principal: ${var.data_engineers_group}
          privileges:
            - USE_SCHEMA
            - SELECT
            - MODIFY
            - CREATE_TABLE

    ops_model_grants:
      securable_type: SCHEMA
      securable_name: ${var.model_catalog}._ops
      grants:
        - principal: ${var.data_engineers_group}
          privileges:
            - USE_SCHEMA
            - SELECT
            - MODIFY
            - CREATE_TABLE
