# Schema declarations for the platform bundle.
#
# The `_ops` schema is created in both the source-aligned and integrated
# catalogs. Tables within `_ops` are created by the `setup_ops_tables` job
# (see ops_setup_job.yml).
#
# Schema names use leading underscore to signal "internal/operational" to
# users browsing the catalog.

resources:
  schemas:
    ops_source:
      catalog_name: ${var.source_catalog}
      name: _ops
      comment: |
        Operational metadata: dataset catalog, engineering state, DQ results,
        pipeline run history, taxonomy reference tables, provider codes.
        Owned by the _platform bundle. See docs/adr/0008-catalog-metadata-schema-design.md.

    ops_model:
      catalog_name: ${var.model_catalog}
      name: _ops
      comment: |
        Operational metadata for the integrated catalog. Mirrors the structure
        of source_catalog._ops; some tables are catalog-specific.
