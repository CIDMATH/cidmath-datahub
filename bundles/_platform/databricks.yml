# Platform bundle — owns shared infrastructure.
#
# Scope:
#   - The `_ops` schema in both source-aligned and integrated catalogs.
#   - The `_ops` tables (dataset_catalog, dataset_engineering, dq_results,
#     pipeline_runs, taxonomy_*, provider_codes). Created by the ops setup job.
#   - Base grants on the catalogs/schemas for the data engineers group.
#
# Out of scope (manual operations performed by an account admin during initial
# setup; documented in `docs/operations.md`):
#   - Catalog creation (`ecdh_dev`, `ecdh_prod`, `ecdh_model_dev`, `ecdh_model_prod`)
#   - Service principal creation and OIDC federation setup
#   - Secret scope creation (`ecdh-<env>-teams-webhook`, etc.)
#
# Deploy order: this bundle deploys first, before `_reference` and any subject
# bundles. CI enforces ordering via workflow dependencies.
#
# See ADR 0004 (monorepo + bundle-per-domain) and ADR 0008 (catalog metadata
# schema design) for the architectural shape.

include:
  - ../../databricks-common.yml
  - resources/*.yml

bundle:
  name: cidmath-datahub-platform

# Bundle-specific sync: include this bundle's `src/` (the setup script) on top
# of the shared `src/` that databricks-common.yml already includes.
sync:
  paths:
    - ../../src
    - ./src

# Bundle resources live under `resources/` and are merged in via the include
# directive above:
#   - resources/schemas.yml         — `_ops` schema declarations
#   - resources/ops_setup_job.yml   — job that creates the `_ops` tables
#   - resources/grants.yml          — base grants on `_ops` schemas
