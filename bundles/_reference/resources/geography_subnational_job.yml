# Job that builds geography.subnational + GADM ADM_2 boundaries (ADR 0022
# slice 3c; vintaged per ADR 0024).
#
# Downloads the GADM 4.1 zipped GeoPackage (~1.4 GB) from geodata.ucdavis.edu —
# the same artifact as the country / country_subdivision jobs — but reads only
# the ADM_2 layer (~45k polygons) via pyogrio. Skips non-ISO (X-prefixed) GADM
# territories. parent_gid is the GADM ADM_1 parent; subdivision_code (nullable)
# is inherited from geography.country_subdivision (slice 3b) via the
# gadm_gid_1 -> subdivision_code map. Writes geography.subnational (per-vintage,
# ADR 0024) and appends ADM_2 polygons to geography.boundary
# (geo_level='subnational_adm2', geoid_system='gadm_gid'); both writes are
# chunked to bound driver memory at ADM_2 volume.
#
# Update semantics: full_refresh per vintage (ADR 0007/0024). No pycountry dep —
# this build reads the country_subdivision table rather than pycountry. No
# secret scope needed.
#
# See bundles/_reference/src/build_geography_subnational.py and ADR 0022/0024.

resources:
  jobs:
    build_geography_subnational_reference:
      name: "[_reference] build_geography_subnational_reference"
      description: |
        Builds geography.subnational (GADM ADM_2, county-equivalent) and appends
        subnational_adm2 rows to geography.boundary from GADM 4.1 ADM_2.
        full_refresh per vintage. Long-running: ~1.4 GB GADM download + ~45k
        ADM_2 polygons dominate.

      tasks:
        - task_key: build_geography_subnational
          spark_python_task:
            python_file: ../src/build_geography_subnational.py
            parameters:
              - "--catalog"
              - "${var.model_catalog}"
              - "--data-engineers-group"
              - "${var.data_engineers_group}"
              - "--analysts-group"
              - "${var.analysts_group}"
          environment_key: geography_subnational_env

      environments:
        - environment_key: geography_subnational_env
          spec:
            client: ${var.serverless_client_version}
            dependencies:
              - ../../../dist/cidmath_datahub-*.whl
              - geopandas>=1.0
              - pyogrio>=0.9
              - shapely>=2.0

      timeout_seconds: 10800

      # Alerting (ADR 0010): Teams primary via notification destination, email
      # as redundant secondary. Same pattern as the other geography jobs.
      webhook_notifications:
        on_failure:
          - id: ${var.teams_destination_id}

      email_notifications:
        on_failure:
          - ${var.email_recipient}
