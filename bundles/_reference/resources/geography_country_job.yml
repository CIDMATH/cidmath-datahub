# Job that builds geography.country + GADM ADM0 boundaries (ADR 0022, slice 3a).
#
# Downloads GADM 4.1 zipped GeoPackage (~1.4 GB) from geodata.ucdavis.edu,
# reads only the ADM_0 layer via pyogrio, joins to ISO 3166-1 codes from
# pycountry and WHO/UN M49 region attributes from country_converter, writes
# geography.country (overwrite) and appends ADM0 polygons to geography.boundary
# (DELETE-WHERE-geo_level='country' then append).
#
# Update semantics: full_refresh (ADR 0007). Refresh cadence: roughly annual
# to track new GADM releases; ISO 3166-1 is essentially static.
#
# Environment carries pycountry + country_converter + geopandas + pyogrio +
# shapely. No secret scope needed (GADM is HTTP without auth; pycountry +
# country_converter are pip packages with embedded data).
#
# See bundles/_reference/src/build_geography_country.py and ADR 0022.

resources:
  jobs:
    build_geography_country_reference:
      name: "[_reference] build_geography_country_reference"
      description: |
        Builds geography.country (ISO 3166-1 + WHO + UN M49) and appends
        country-level rows to geography.boundary from GADM 4.1 ADM0.
        full_refresh. Long-running: ~1.4 GB GADM download dominates.

      tasks:
        - task_key: build_geography_country
          spark_python_task:
            python_file: ../src/build_geography_country.py
            parameters:
              - "--catalog"
              - "${var.model_catalog}"
              - "--data-engineers-group"
              - "${var.data_engineers_group}"
              - "--analysts-group"
              - "${var.analysts_group}"
          environment_key: geography_country_env

      environments:
        - environment_key: geography_country_env
          spec:
            client: ${var.serverless_client_version}
            dependencies:
              - ../../../dist/cidmath_datahub-*.whl
              - pycountry>=23.12
              - country_converter>=1.2
              - geopandas>=1.0
              - pyogrio>=0.9
              - shapely>=2.0

      timeout_seconds: 7200

      # Alerting (ADR 0010): Teams primary via notification destination,
      # email as redundant secondary. Same pattern as geography_job /
      # crosswalk_job.
      webhook_notifications:
        on_failure:
          - id: ${var.teams_destination_id}

      email_notifications:
        on_failure:
          - ${var.email_recipient}
