# Job: build the layered geography subject (ADR 0036/0037/0039) on the
# raw -> processed -> canonical path, ONE TASK PER LEVEL wired parents-first via
# depends_on. The job DAG owns orchestration (ordering, retry, repair-from-failed-task,
# safe parallelism); each build_<level>_layered owns the per-level computation. This
# enables granular partial refreshes (re-run a level + its descendants) without
# rebuilding the whole subject.
#
# Deliberately SEPARATE from build_geography_reference (the legacy whole-geography
# build): both write geography.us_*, so keeping them apart lets the migration be
# validated in dev without colliding. The cutover (later) removes each migrated level
# from the legacy job. Tract / zcta / block-group / block are added here as tasks.
#
# Each level lands its 1:1 source payloads in the geography_raw landing Volume,
# derives geography_processed.*, and promotes the source-agnostic geography.*.
# vintage_snapshot with a DQ-gated promote (ADR 0034/0037/0039). Geospatial libs are
# on this job's environment only (ADR 0020); the IPUMS key is read at runtime.
#
# See bundles/_reference/src/build_geography.py (build_<level>_layered) + ADR 0036/0037/0039.

resources:
  jobs:
    build_geography_layered:
      name: "[_reference] build_geography_layered"
      description: |
        Layered geography build, parents-first per-level DAG (ADR 0036/0037/0039):
        us_state -> us_county (-> us_tract -> ... as migrated). Each task lands 1:1
        source payloads in the geography_raw landing Volume, derives geography_processed,
        and promotes geography.*. Long-running: IPUMS extracts are asynchronous.

      tasks:
        - task_key: us_state
          spark_python_task:
            python_file: ../src/build_geography.py
            parameters:
              - "--level"
              - "us_state"
              - "--catalog"
              - "${var.model_catalog}"
              - "--source-catalog"
              - "${var.source_catalog}"
              - "--vintages"
              - "2010,2020"
              - "--data-engineers-group"
              - "${var.data_engineers_group}"
              - "--analysts-group"
              - "${var.analysts_group}"
              - "--ipums-secret-scope"
              - "${var.ipums_secret_scope}"
              - "--ipums-secret-key"
              - "${var.ipums_secret_key}"
          environment_key: geography_layered_env

        # Parents-first: us_county joins us_state's processed table for state labels.
        - task_key: us_county
          depends_on:
            - task_key: us_state
          spark_python_task:
            python_file: ../src/build_geography.py
            parameters:
              - "--level"
              - "us_county"
              - "--catalog"
              - "${var.model_catalog}"
              - "--source-catalog"
              - "${var.source_catalog}"
              - "--vintages"
              - "2010,2020"
              - "--data-engineers-group"
              - "${var.data_engineers_group}"
              - "--analysts-group"
              - "${var.analysts_group}"
              - "--ipums-secret-scope"
              - "${var.ipums_secret_scope}"
              - "--ipums-secret-key"
              - "${var.ipums_secret_key}"
          environment_key: geography_layered_env

        # Parents-first: us_tract joins us_county (county_name) + us_state (state labels).
        - task_key: us_tract
          depends_on:
            - task_key: us_county
          spark_python_task:
            python_file: ../src/build_geography.py
            parameters:
              - "--level"
              - "us_tract"
              - "--catalog"
              - "${var.model_catalog}"
              - "--source-catalog"
              - "${var.source_catalog}"
              - "--vintages"
              - "2010,2020"
              - "--data-engineers-group"
              - "${var.data_engineers_group}"
              - "--analysts-group"
              - "${var.analysts_group}"
              - "--ipums-secret-scope"
              - "${var.ipums_secret_scope}"
              - "--ipums-secret-key"
              - "${var.ipums_secret_key}"
          environment_key: geography_layered_env

        # Non-nesting: us_zcta joins us_county + us_state for the approximate primary county
        # (largest land-area overlap, from the Census ZCTA↔county relationship file). Runs in
        # parallel with us_tract (both depend only on us_county). NOTE: this task fetches the
        # Census relationship file from www2.census.gov — the job network allowlist must
        # permit that host (in addition to the NHGIS API host).
        - task_key: us_zcta
          depends_on:
            - task_key: us_county
          spark_python_task:
            python_file: ../src/build_geography.py
            parameters:
              - "--level"
              - "us_zcta"
              - "--catalog"
              - "${var.model_catalog}"
              - "--source-catalog"
              - "${var.source_catalog}"
              - "--vintages"
              - "2010,2020"
              - "--data-engineers-group"
              - "${var.data_engineers_group}"
              - "--analysts-group"
              - "${var.analysts_group}"
              - "--ipums-secret-scope"
              - "${var.ipums_secret_scope}"
              - "--ipums-secret-key"
              - "${var.ipums_secret_key}"
          environment_key: geography_layered_env

      environments:
        - environment_key: geography_layered_env
          spec:
            client: ${var.serverless_client_version}
            dependencies:
              - ../../../dist/cidmath_datahub-*.whl
              - ipumspy>=0.5
              - geopandas>=1.0
              - pyogrio>=0.9
              - shapely>=2.0

      timeout_seconds: 7200

      # Alerting (ADR 0010): Teams primary via notification destination, email secondary.
      webhook_notifications:
        on_failure:
          - id: ${var.teams_destination_id}

      email_notifications:
        on_failure:
          - ${var.email_recipient}
