# Job: build the layered geography subject (ADR 0036/0037/0039) on the
# raw -> processed -> canonical path, ONE TASK PER LEVEL wired parents-first via
# depends_on. The job DAG owns orchestration (ordering, retry, repair-from-failed-task,
# safe parallelism); each build_<level>_layered owns the per-level computation. This
# enables granular partial refreshes (re-run a level + its descendants) without
# rebuilding the whole subject.
#
# This is the SOLE geography build now — the legacy whole-geography build
# (build_geography_reference / geography_job.yml) and its run() entrypoint are retired
# (cutover complete 2026-06-29). Every level is a task here, including the static
# us_hhs_region (the shared builder's non-vintaged shape; no shapefiles, no NHGIS secret).
#
# Each level lands its 1:1 source payloads in the geography_raw landing Volume,
# derives geography_processed.*, and promotes the source-agnostic geography.*.
# vintage_snapshot with a DQ-gated promote (ADR 0034/0037/0039). Geospatial libs are
# on this job's environment only (ADR 0020); the IPUMS key is read at runtime.
#
# The USDA ERS RUCA augmenting tables (us_ruca_tract / us_ruca_zip + the us_ruca_zcta bridge
# view) are folded onto the shared builder here too (ADR 0038 Delta 6), via build_ruca.py, wired
# parents-first after us_tract / us_zcta. This retires the standalone ruca_job.yml.
#
# See bundles/_reference/src/build_geography.py (build_<level>_layered) + ADR 0036/0037/0039.

resources:
  jobs:
    build_geography_layered:
      name: "[_reference] build_geography_layered"
      description: |
        Layered geography build, parents-first per-level DAG (ADR 0036/0037/0039):
        us_state -> us_county (-> us_tract -> ... as migrated). Each task lands 1:1
        source payloads in the geography_raw landing Volume, derives geography_processed,
        and promotes geography.*. Long-running: IPUMS extracts are asynchronous.

      tasks:
        # Static, generated: the ten HHS regions (no shapefiles, no vintage, no NHGIS secret).
        # Root reference — no parents and nothing depends on it; runs in parallel. Built on the
        # shared builder's STATIC shape (ADR 0036): full_refresh, no vintage column.
        - task_key: us_hhs_region
          spark_python_task:
            python_file: ../src/build_geography.py
            parameters:
              - "--level"
              - "us_hhs_region"
              - "--catalog"
              - "${var.model_catalog}"
              - "--source-catalog"
              - "${var.source_catalog}"
              - "--data-engineers-group"
              - "${var.data_engineers_group}"
              - "--analysts-group"
              - "${var.analysts_group}"
          environment_key: geography_layered_env

        # Depends on us_hhs_region only for the cross-table hhs_region FK *validation* (not a data
        # join — us_state derives hhs_region in code; us_hhs_region is the integrity oracle).
        - task_key: us_state
          depends_on:
            - task_key: us_hhs_region
          spark_python_task:
            python_file: ../src/build_geography.py
            parameters:
              - "--level"
              - "us_state"
              - "--catalog"
              - "${var.model_catalog}"
              - "--source-catalog"
              - "${var.source_catalog}"
              - "--vintages"
              - "2010,2020"
              - "--data-engineers-group"
              - "${var.data_engineers_group}"
              - "--analysts-group"
              - "${var.analysts_group}"
              - "--ipums-secret-scope"
              - "${var.ipums_secret_scope}"
              - "--ipums-secret-key"
              - "${var.ipums_secret_key}"
          environment_key: geography_layered_env

        # Parents-first: us_county joins us_state's processed table for state labels.
        - task_key: us_county
          depends_on:
            - task_key: us_state
          spark_python_task:
            python_file: ../src/build_geography.py
            parameters:
              - "--level"
              - "us_county"
              - "--catalog"
              - "${var.model_catalog}"
              - "--source-catalog"
              - "${var.source_catalog}"
              - "--vintages"
              - "2010,2020"
              - "--data-engineers-group"
              - "${var.data_engineers_group}"
              - "--analysts-group"
              - "${var.analysts_group}"
              - "--ipums-secret-scope"
              - "${var.ipums_secret_scope}"
              - "--ipums-secret-key"
              - "${var.ipums_secret_key}"
          environment_key: geography_layered_env

        # Parents-first: us_tract joins us_county (county_name) + us_state (state labels).
        - task_key: us_tract
          depends_on:
            - task_key: us_county
          spark_python_task:
            python_file: ../src/build_geography.py
            parameters:
              - "--level"
              - "us_tract"
              - "--catalog"
              - "${var.model_catalog}"
              - "--source-catalog"
              - "${var.source_catalog}"
              - "--vintages"
              - "2010,2020"
              - "--data-engineers-group"
              - "${var.data_engineers_group}"
              - "--analysts-group"
              - "${var.analysts_group}"
              - "--ipums-secret-scope"
              - "${var.ipums_secret_scope}"
              - "--ipums-secret-key"
              - "${var.ipums_secret_key}"
          environment_key: geography_layered_env

        # Non-nesting: us_zcta joins us_county + us_state for the approximate primary county
        # (largest land-area overlap, from the Census ZCTA↔county relationship file). Runs in
        # parallel with us_tract (both depend only on us_county). NOTE: this task fetches the
        # Census relationship file from www2.census.gov — the job network allowlist must
        # permit that host (in addition to the NHGIS API host).
        - task_key: us_zcta
          depends_on:
            - task_key: us_county
          spark_python_task:
            python_file: ../src/build_geography.py
            parameters:
              - "--level"
              - "us_zcta"
              - "--catalog"
              - "${var.model_catalog}"
              - "--source-catalog"
              - "${var.source_catalog}"
              - "--vintages"
              - "2010,2020"
              - "--data-engineers-group"
              - "${var.data_engineers_group}"
              - "--analysts-group"
              - "${var.analysts_group}"
              - "--ipums-secret-scope"
              - "${var.ipums_secret_scope}"
              - "--ipums-secret-key"
              - "${var.ipums_secret_key}"
          environment_key: geography_layered_env

        # Nests in tract: us_block_group joins us_county + us_state for labels and FK-validates
        # against tract/county/state. ~217k (2010) / ~242k (2020) rows per vintage — written
        # per-(level,vintage) chunk (ADR 0020). NHGIS national file us_blck_grp_<year>.
        - task_key: us_block_group
          depends_on:
            - task_key: us_tract
          spark_python_task:
            python_file: ../src/build_geography.py
            parameters:
              - "--level"
              - "us_block_group"
              - "--catalog"
              - "${var.model_catalog}"
              - "--source-catalog"
              - "${var.source_catalog}"
              - "--vintages"
              - "2010,2020"
              - "--data-engineers-group"
              - "${var.data_engineers_group}"
              - "--analysts-group"
              - "${var.analysts_group}"
              - "--ipums-secret-scope"
              - "${var.ipums_secret_scope}"
              - "--ipums-secret-key"
              - "${var.ipums_secret_key}"
          environment_key: geography_layered_env

        # Atomic level: us_block nests in us_block_group (FK-validates against
        # block_group/county/state). NHGIS has no national block file, so it fetches ~51
        # per-state shapefiles and reads them per-state + UNION. ~8M rows/vintage — the
        # heaviest task (large states load into the driver during read; bump the driver if it
        # OOMs). Geometry simplification on ~8M polygons is the slow part.
        - task_key: us_block
          depends_on:
            - task_key: us_block_group
          spark_python_task:
            python_file: ../src/build_geography.py
            parameters:
              - "--level"
              - "us_block"
              - "--catalog"
              - "${var.model_catalog}"
              - "--source-catalog"
              - "${var.source_catalog}"
              - "--vintages"
              - "2010,2020"
              - "--data-engineers-group"
              - "${var.data_engineers_group}"
              - "--analysts-group"
              - "${var.analysts_group}"
              - "--ipums-secret-scope"
              - "${var.ipums_secret_scope}"
              - "--ipums-secret-key"
              - "${var.ipums_secret_key}"
          environment_key: geography_layered_env

        # Augmenting table (ADR 0038/0040): USDA ERS RUCA rural/urban codes by census tract.
        # Separate entrypoint (build_ruca.py), folded onto the shared builder. Depends on us_tract
        # for the (geoid, vintage) FK validation (against geography_processed.us_tract, same catalog).
        - task_key: us_ruca_tract
          depends_on:
            - task_key: us_tract
          spark_python_task:
            python_file: ../src/build_ruca.py
            parameters:
              - "--source-catalog"
              - "${var.source_catalog}"
              - "--model-catalog"
              - "${var.model_catalog}"
              - "--level"
              - "tract"
              - "--data-engineers-group"
              - "${var.data_engineers_group}"
              - "--analysts-group"
              - "${var.analysts_group}"
          environment_key: geography_layered_env

        # Augmenting table: RUCA codes by ZIP (>= 2010) + the us_ruca_zcta bridge view. Depends on
        # us_zcta (the view joins us_zcta; the approximate ZIP->ZCTA match rate validates against
        # geography_processed.us_zcta, same catalog).
        - task_key: us_ruca_zip
          depends_on:
            - task_key: us_zcta
          spark_python_task:
            python_file: ../src/build_ruca.py
            parameters:
              - "--source-catalog"
              - "${var.source_catalog}"
              - "--model-catalog"
              - "${var.model_catalog}"
              - "--level"
              - "zip"
              - "--data-engineers-group"
              - "${var.data_engineers_group}"
              - "--analysts-group"
              - "${var.analysts_group}"
          environment_key: geography_layered_env

        # Augmenting table (ADR 0038): static RUCA code-definitions lookup (version-specific
        # primary/secondary descriptions, v1.11 / v2.0 / v3.x). Generated from reference/ruca.py --
        # no download, no vintage, no upstream dependency.
        - task_key: us_ruca_code_definitions
          spark_python_task:
            python_file: ../src/build_ruca.py
            parameters:
              - "--source-catalog"
              - "${var.source_catalog}"
              - "--model-catalog"
              - "${var.model_catalog}"
              - "--level"
              - "definitions"
              - "--data-engineers-group"
              - "${var.data_engineers_group}"
              - "--analysts-group"
              - "${var.analysts_group}"
          environment_key: geography_layered_env

      environments:
        - environment_key: geography_layered_env
          spec:
            client: ${var.serverless_client_version}
            dependencies:
              - ../../../dist/cidmath_datahub-*.whl
              - ipumspy>=0.5
              - geopandas>=1.0
              - pyogrio>=0.9
              - shapely>=2.0
              # RUCA (us_ruca_*) reads ERS CSV/XLSX/legacy .xls: pandas (via geopandas) + Excel engines.
              - openpyxl
              - xlrd

      timeout_seconds: 7200

      # Alerting (ADR 0010): Teams primary via notification destination, email secondary.
      webhook_notifications:
        on_failure:
          - id: ${var.teams_destination_id}

      email_notifications:
        on_failure:
          - ${var.email_recipient}
