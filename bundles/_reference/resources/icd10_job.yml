# Job that builds the canonical codes.icd10cm reference table (ADR 0014; first
# table in the codes schema).
#
# Downloads the CDC NCHS ICD-10-CM order file for the requested fiscal-year
# edition(s), overlays the Apr-1 mid-year update where published (--midyear-update
# auto), and builds the classification hierarchy (parent/ancestors/level + chapter
# /block from the tabular XML; --hierarchy build; ADR 0030). Parses/validates via
# cidmath_datahub.reference.icd10 and writes ecdh_model_<env>.codes.icd10cm keyed by
# (icd10_code, edition_year).
# Thin entrypoint over the run_build seam (ADR 0027); editions are re-pullable,
# so the table is vintage-reproducible (full_refresh per edition; ADR 0007/0024).
#
# Deployed on merge by deploy-reference.yml (path filter bundles/_reference/**)
# but triggered from the UI -- only build_time_reference auto-runs. To load more
# editions, add years to the --edition-year parameter (e.g. "2026" "2021").
#
# See bundles/_reference/src/build_icd10.py and ADR 0014/0015.

resources:
  jobs:
    build_icd10_reference:
      name: "[_reference] build_icd10_reference"
      description: |
        Builds codes.icd10cm (ICD-10-CM diagnosis code system, CDC/NCHS) in the
        integrated catalog. One row per code per fiscal-year edition; PK
        (icd10_code, edition_year). Blocking DQ: uniqueness, non-null
        description, code-format. Reference table; full_refresh per edition.

      tasks:
        - task_key: build_icd10
          spark_python_task:
            python_file: ../src/build_icd10.py
            parameters:
              - "--catalog"
              - "${var.model_catalog}"
              - "--edition-year"
              - "2026"
              - "--midyear-update"
              - "auto"
              - "--hierarchy"
              - "build"
              - "--data-engineers-group"
              - "${var.data_engineers_group}"
              - "--analysts-group"
              - "${var.analysts_group}"
          environment_key: reference_env

      environments:
        - environment_key: reference_env
          spec:
            client: ${var.serverless_client_version}
            dependencies:
              - ../../../dist/cidmath_datahub-*.whl

      timeout_seconds: 3600

      # Alerting (ADR 0010): Teams primary, email secondary.
      webhook_notifications:
        on_failure:
          - id: ${var.teams_destination_id}

      email_notifications:
        on_failure:
          - ${var.email_recipient}
