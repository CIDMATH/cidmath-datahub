# Job that builds the canonical time reference tables.
#
# Generates time.calendar_date and time.epi_week via deterministic computation,
# on the shared build_reference builder (ADR 0036) using the static path with
# Volume-backed generated landings (ADR 0039, amended 2026-06-30): the generator
# lands a parquet payload in time_raw._landing, the 1:1 raw (time_raw.*) is built
# from it, and the canonical (time.*) is promoted to the model catalog. Idempotent
# (full_refresh; SNAPSHOT_PER_RUN landing skips a same-day re-generate).
#
# See ADR 0014 (reference data scope) and bundles/_reference/src/build_time.py.

resources:
  jobs:
    build_time_reference:
      name: "[_reference] build_time_reference"
      description: |
        Generates time.calendar_date and time.epi_week in the integrated
        catalog. Computational reference data; safe to re-run (full_refresh).

      tasks:
        - task_key: build_time
          spark_python_task:
            python_file: ../src/build_time.py
            parameters:
              - "--catalog"
              - "${var.model_catalog}"
              - "--source-catalog"
              - "${var.source_catalog}"
              - "--start-year"
              - "1900"
              - "--end-year"
              - "2099"
              - "--data-engineers-group"
              - "${var.data_engineers_group}"
              - "--analysts-group"
              - "${var.analysts_group}"
          environment_key: reference_env

      environments:
        - environment_key: reference_env
          spec:
            client: ${var.serverless_client_version}
            dependencies:
              - ../../../dist/cidmath_datahub-*.whl
              # Phase 0 writes the generated payload to the Volume without Spark (pandas/pyarrow).
              - pandas>=2.0
              - pyarrow>=14.0

      email_notifications:
        on_failure:
          - ${var.email_recipient}
