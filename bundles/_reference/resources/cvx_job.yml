# Job that builds the canonical codes.cvx reference table (ADR 0014, ADR 0032).
#
# Fetches the CDC IIS CVX "Vaccine Administered" XML-new report, writes the raw
# payload verbatim to an immutable date-stamped file on the codes.cvx_raw UC
# Volume, and writes ecdh_model_<env>.codes.cvx keyed by (cvx_code, snapshot_date)
# using snapshot_replace (every snapshot retained; ADR 0032). Parses/validates via
# cidmath_datahub.reference.cvx. Also (re)creates the codes.cvx_current view.
#
# Thin entrypoint over the run_build seam (ADR 0027). CVX is revised in place, so
# history is preserved by us: raw Volume snapshot + in-table snapshot_date tracking
# (ADR 0032). snapshot_date defaults to the run date.
#
# Scheduled annually (06:00 ET on Jan 15). Re-running the same day is idempotent:
# the immutable Volume file is not overwritten and snapshot_replace replaces only
# that snapshot_date's rows.
#
# See bundles/_reference/src/build_cvx.py and ADR 0014/0032.

resources:
  jobs:
    build_cvx_reference:
      name: "[_reference] build_cvx_reference"
      description: |
        Builds codes.cvx (CDC IIS CVX vaccine code set) in the integrated catalog.
        Flat code set; one row per code per snapshot; PK (cvx_code, snapshot_date);
        snapshot_replace with raw XML-new preserved on a UC Volume. Blocking DQ:
        (cvx_code, snapshot_date) uniqueness, non-null required fields,
        vaccine_status controlled vocab. Annual schedule.

      schedule:
        # Annual: 06:00 on January 15 (Emory / US Eastern).
        quartz_cron_expression: "0 0 6 15 1 ?"
        timezone_id: "America/New_York"
        pause_status: "UNPAUSED"

      tasks:
        - task_key: build_cvx
          spark_python_task:
            python_file: ../src/build_cvx.py
            parameters:
              - "--catalog"
              - "${var.model_catalog}"
              - "--data-engineers-group"
              - "${var.data_engineers_group}"
              - "--analysts-group"
              - "${var.analysts_group}"
          environment_key: reference_env

      environments:
        - environment_key: reference_env
          spec:
            client: ${var.serverless_client_version}
            dependencies:
              - ../../../dist/cidmath_datahub-*.whl

      timeout_seconds: 3600

      # Alerting (ADR 0010): Teams primary, email secondary.
      webhook_notifications:
        on_failure:
          - id: ${var.teams_destination_id}

      email_notifications:
        on_failure:
          - ${var.email_recipient}
