# Job that builds the canonical geography reference tables (ADR 0020).
#
# Pulls state + county boundaries (vintages 2010 + 2020) from IPUMS NHGIS via
# the IPUMS API, builds the static HHS-region table, and writes companion
# generalized geometry (WKB) to geography.boundary. Update semantics:
# full_refresh (ADR 0007); safe to re-run.
#
# Geospatial libraries (ipumspy, geopandas, pyogrio, shapely) are added to THIS
# job's environment only, not the shared cidmath_datahub wheel, to keep the wheel
# lean (ADR 0020). The IPUMS API key is read at runtime from the secret scope
# named by ${var.ipums_secret_scope}; the secret value never appears in config.
#
# See bundles/_reference/src/build_geography.py and ADR 0020.

resources:
  jobs:
    build_geography_reference:
      name: "[_reference] build_geography_reference"
      description: |
        Builds geography.state, geography.county, geography.hhs_region, and
        companion geography.boundary (generalized) from IPUMS NHGIS shapefiles.
        Long-running: IPUMS extracts are asynchronous (submit -> poll -> download).
        full_refresh.

      tasks:
        - task_key: build_geography
          spark_python_task:
            python_file: ../src/build_geography.py
            parameters:
              - "--catalog"
              - "${var.model_catalog}"
              - "--vintages"
              - "2010,2020"
              - "--data-engineers-group"
              - "${var.data_engineers_group}"
              - "--analysts-group"
              - "${var.analysts_group}"
              - "--ipums-secret-scope"
              - "${var.ipums_secret_scope}"
              - "--ipums-secret-key"
              - "${var.ipums_secret_key}"
          environment_key: geography_env

      environments:
        - environment_key: geography_env
          spec:
            client: ${var.serverless_client_version}
            dependencies:
              - ../../../dist/cidmath_datahub-*.whl
              - ipumspy>=0.5
              - geopandas>=1.0
              - pyogrio>=0.9
              - shapely>=2.0

      timeout_seconds: 7200

      # Alerting (ADR 0010): Teams primary via notification destination,
      # email as redundant secondary. Destination IDs are created once per
      # workspace (Settings -> Notifications) and referenced by UUID.
      webhook_notifications:
        on_failure:
          - id: ${var.teams_destination_id}

      email_notifications:
        on_failure:
          - ${var.email_recipient}
