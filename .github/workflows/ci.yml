# CI workflow — runs on every PR and push to main.
#
# Stages:
#   1. Lint + format check (ruff)
#   2. Unit + data tests (pytest)
#   3. Bundle validate (databricks bundle validate) for every bundle
#   4. Convention checks (ADR 0016 hybrid policy enforcement)
#
# Integration tests against the dev workspace run from deploy-platform.yml /
# deploy-domain.yml when bundles are deployed, not from this workflow.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write   # for posting lint-style warnings as PR comments
  id-token: write        # required for OIDC federation to Databricks

# Cancel an in-progress CI run when a newer commit arrives on the same ref —
# no point validating a superseded commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff format check
        run: ruff format --check src tests

      - name: Ruff lint
        run: ruff check src tests

      - name: Unit and data tests
        run: pytest tests/unit tests/data -v --cov

      - name: Coverage report (informational, not gated)
        run: |
          coverage report --skip-empty
          coverage xml

  bundle-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Use the dev environment so `DATABRICKS_CLIENT_ID` (the dev SP's
    # application_id, scoped to the dev environment) is available. Validate
    # only resolves bundle config against the dev workspace — it doesn't
    # modify anything.
    environment: dev
    strategy:
      matrix:
        bundle: [_platform, _reference]
        # Add bundles to this list as they land: wastewater, vaccine, etc.

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Install package (for wheel build)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build wheel
        run: python -m build --wheel --outdir dist

      - name: Validate bundle (${{ matrix.bundle }})
        working-directory: bundles/${{ matrix.bundle }}
        run: databricks bundle validate --target dev
        env:
          # OIDC auth via GitHub workload identity federation (see ADR 0012).
          # Same SP and federation policy used for deploys — validate is
          # read-only and just resolves variable references against the
          # workspace metadata.
          DATABRICKS_AUTH_TYPE: github-oidc
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_CLIENT_ID }}

  convention-checks:
    # The four CI-enforced rules from ADR 0016 (controlled-vocabulary
    # membership for update_semantics / DQ severity / UC tags, plus
    # _ops.dataset_catalog row presence). Implemented in
    # scripts/ci/check_conventions.py. Today the script enforces the integrity
    # of the vocabularies module itself; the per-rule pipeline-scanning logic
    # activates with the first data pipeline (see the script's docstring).
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: bundle-validate

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run convention checks (ADR 0016)
        run: python scripts/ci/check_conventions.py
