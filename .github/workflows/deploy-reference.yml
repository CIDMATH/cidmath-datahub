# Deploy the _reference bundle.
#
# Triggered by:
#   - Merge to main: deploys to dev (via ecdh-deploy-dev SP)
#   - Tag push (v*): deploys to prod, gated by GitHub Environment approval
#
# Path-filtered to changes in bundles/_reference/** or the shared package.
#
# Deploy order: _platform must already be deployed for the target (it creates
# the catalogs and _ops schema this bundle's metadata registration writes to).
# In a fresh environment, deploy _platform first.

name: deploy-reference

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "bundles/_reference/**"
      - "src/cidmath_datahub/**"
      - "databricks-common.yml"
      - "pyproject.toml"
      - ".github/workflows/deploy-reference.yml"

permissions:
  id-token: write
  contents: read

# Only one deploy of this bundle per ref at a time (see deploy-platform.yml
# and ADR 0017 for why — concurrent redeploys cancel each other's job runs).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: dev
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Build wheel
        run: python -m build --wheel --outdir dist
      - name: Install Databricks CLI
        uses: databricks/setup-cli@main
      - name: Deploy _reference to dev
        working-directory: bundles/_reference
        run: |
          databricks bundle deploy --target dev
          databricks bundle run --target dev build_time_reference
        env:
          DATABRICKS_AUTH_TYPE: github-oidc
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_CLIENT_ID }}

  deploy-prod:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: prod
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Build wheel
        run: python -m build --wheel --outdir dist
      - name: Install Databricks CLI
        uses: databricks/setup-cli@main
      - name: Deploy _reference to prod
        working-directory: bundles/_reference
        run: |
          databricks bundle deploy --target prod
          databricks bundle run --target prod build_time_reference
        env:
          DATABRICKS_AUTH_TYPE: github-oidc
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_CLIENT_ID }}
