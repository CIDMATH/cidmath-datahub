# databricks-common.yml
#
# Shared bundle configuration included by every bundle in this repo. Each
# bundle's `databricks.yml` does:
#
#     include:
#       - ../../databricks-common.yml
#
# Anything bundle-specific (resources, bundle-name suffix, additional tags)
# goes in the bundle's own databricks.yml. Defaults that should apply across
# every bundle live here.
#
# See ADR 0004 (monorepo + bundle-per-domain) for the architectural shape.

# NOTE: bundle.name is intentionally NOT set in this shared file. Each bundle
# declares its own UNIQUE name in its bundles/<name>/databricks.yml
# (cidmath-datahub-platform, cidmath-datahub-reference, ...). A single shared
# name here would override the per-bundle names (the included value wins), so
# every bundle would deploy to the SAME workspace root (.bundle/<name>/<target>)
# and each `bundle deploy` would prune the others' synced files — surfacing as
# "Cannot read the python file" when two bundle deploys race on one push. The
# dev root_path (mode: development) and the prod root_path below both derive from
# ${bundle.name}, so unique names give each bundle its own isolated root. See
# ADR 0017 lesson #10.

workspace:
  host: https://dbc-926acb48-1c75.cloud.databricks.com

# --- Variables ---
# Bundle variables that every bundle inherits. Values are set per-target below.

variables:
  source_catalog:
    description: Source-aligned catalog name (ecdh_dev / ecdh_prod).
  model_catalog:
    description: Integrated/modeled catalog name (ecdh_model_dev / ecdh_model_prod).
  data_engineers_group:
    description: Workspace group holding engineer-tier grants (ecdh-data-engineers).
    default: ecdh-data-engineers
  analysts_group:
    description: |
      Workspace group holding reader-tier grants (ecdh-analysts). Reads
      analysis-layer and reference schemas; never raw/processed/_ops. See ADR 0018.
    default: ecdh-analysts
  deploy_sp_application_id:
    description: |
      Application ID (UUID) of the deploy service principal for the current
      target. This is the SP's OAuth client identifier and is what DAB's
      `service_principal_name` field expects (NOT the display name — see
      ADR 0017 for the gotcha).
  teams_webhook_scope:
    description: Databricks secret scope holding the Teams incoming webhook URL.
  teams_webhook_key:
    description: Key within the secret scope for the Teams webhook URL.
    default: data_hub
  teams_destination_id:
    description: |
      Databricks notification-destination ID (UUID) for the Teams incoming
      webhook. Created once per workspace via Settings -> Workspace Admin ->
      Notifications; referenced from job ``webhook_notifications`` blocks.
      Distinct from ``teams_webhook_scope``/``_key``, which hold the raw URL
      for code that wants to post directly (ADR 0010). Set per-target.
  ipums_secret_scope:
    description: |
      Databricks secret scope holding the IPUMS NHGIS API key, used by the
      geography reference build (ADR 0020). Set per-target.
  ipums_secret_key:
    description: Key within the IPUMS secret scope for the NHGIS API key.
    default: nhgis_api_key
  loinc_secret_scope:
    description: |
      Databricks secret scope holding the LOINC Download API credentials (HTTP
      Basic username/password), used by the codes.loinc reference build (ADR 0014;
      reuses the authenticated-download pattern of ADR 0012). Set per-target.
  loinc_username_key:
    description: Key within the LOINC secret scope for the LOINC username.
    default: loinc_username
  loinc_password_key:
    description: Key within the LOINC secret scope for the LOINC password.
    default: loinc_password
  email_recipient:
    description: Primary email recipient for paging-severity alerts and digest.
    default: connor.vanmeter@emory.edu
  project_tag:
    description: Value of the `project` tag applied to all resources.
    default: cidmath-datahub
  cost_center_tag:
    description: Value of the `cost_center` tag (typically the grant code).
    default: insightnet-cdc-rfa-ft-23-0069
  serverless_client_version:
    description: |
      Databricks serverless compute environment version used by all jobs and
      LDP pipelines in this repo. To upgrade (e.g., when v6 ships), change
      the default here and redeploy — no edits to individual resource files
      needed. Current default: v5 (Python 3.12.3, supported until Feb 2029).
      See https://docs.databricks.com/aws/en/release-notes/serverless/environment-version
    default: "5"

# --- Artifacts ---
# The shared cidmath_datahub wheel. Every bundle installs this as a library
# in its job/pipeline definitions via:
#     libraries:
#       - whl: ../../dist/cidmath_datahub-*.whl
# (Or referenced via the artifact key when supported by your DAB version.)

artifacts:
  cidmath_datahub:
    type: whl
    build: python -m build --wheel --outdir dist
    # Path is resolved relative to this file's location (databricks-common.yml
    # at the repo root). `.` means "build the wheel from this directory" —
    # i.e., the repo root, where pyproject.toml lives.
    path: .

# --- Targets ---
# `dev` is the default target. Personal dev work happens via `mode: development`
# which auto-prefixes resources with `[dev <username>]` so multiple developers
# coexist without collision.
#
# CI deploys to `dev` use the ecdh-deploy-dev service principal via OIDC
# federation (no GitHub secrets to manage; ADR 0012).
#
# Prod deploys are tag-triggered and gated by GitHub Environments
# `required_reviewers`. Service principal: ecdh-deploy-prod.

targets:
  dev:
    mode: development
    default: true
    # Let the engineer-tier group view and trigger the CI-deployed dev jobs.
    # Dev-scoped (not top-level) so this run access does NOT extend to prod,
    # where runs are reviewer-gated. DAB reapplies declared ACLs on every deploy,
    # so this survives redeploys — unlike a manual UI grant, which DAB resets.
    # Bundle-permission `CAN_RUN` maps to a job's "Can Manage Run" (view + run +
    # manage runs); runs still execute as the job owner (the deploy SP), so
    # catalog grants are unaffected.
    permissions:
      - level: CAN_RUN
        group_name: ${var.data_engineers_group}
    workspace:
      host: https://dbc-926acb48-1c75.cloud.databricks.com
    variables:
      source_catalog: ecdh_dev
      model_catalog: ecdh_model_dev
      deploy_sp_application_id: a55b6164-c0eb-42cf-a438-7de33c150f4a
      teams_webhook_scope: ecdh-dev-teams-webhook
      teams_destination_id: c33c2883-2b42-4621-9578-b864fd33547f
      ipums_secret_scope: ecdh-dev-ipums
      loinc_secret_scope: ecdh-dev-loinc
    presets:
      tags:
        project: ${var.project_tag}
        env: dev
        cost_center: ${var.cost_center_tag}

  prod:
    mode: production
    workspace:
      host: https://dbc-926acb48-1c75.cloud.databricks.com
      # Pin the bundle's prod root path to the deploy SP's home directory so
      # every deploy lands at the same workspace path regardless of who/what
      # triggered it. Without this, DAB warns about non-deterministic placement.
      root_path: /Workspace/Users/${var.deploy_sp_application_id}/.bundle/${bundle.name}/${bundle.target}
    run_as:
      # DAB's `service_principal_name` field accepts the application_id (UUID),
      # NOT the display name. Using the display name here produces
      # "<name> cannot be set as run_as service principal, because it doesn't
      # exist." even when the SP is in the workspace.
      service_principal_name: ${var.deploy_sp_application_id}
    variables:
      source_catalog: ecdh_prod
      model_catalog: ecdh_model_prod
      deploy_sp_application_id: caff7ad3-d82f-4692-98cc-678dc6807cbd
      teams_webhook_scope: ecdh-prod-teams-webhook
      teams_destination_id: 691bab0f-9854-4f89-ab12-3138be3ec998
      ipums_secret_scope: ecdh-prod-ipums
      loinc_secret_scope: ecdh-prod-loinc
    presets:
      tags:
        project: ${var.project_tag}
        env: prod
        cost_center: ${var.cost_center_tag}

# --- Sync ---
# Paths in `include`d YAML files are resolved by DAB relative to the included
# file's location, not the bundle's location. Putting sync.paths here with
# `../../src` would resolve from THIS file (at the repo root) up two levels,
# which is outside the repo entirely. So sync.paths is declared per-bundle
# in each `bundles/<name>/databricks.yml` instead, where the relative path
# resolves correctly. Don't add sync.paths to this file.
